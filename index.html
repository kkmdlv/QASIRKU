<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0,
                 maximum-scale=1.0,
                 user-scalable=no,
                 viewport-fit=cover">

  <meta name="theme-color" content="#800000">
<link rel="manifest" href="manifest.json">
  <title>KUKAMI SUPERAPP</title>

  <style>

    body{
      margin:0;
      width:100vw;
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      background:#E5E5E5;
      font-family:sans-serif;
    }

    .logo{
      font-size:48px;
      font-weight:900;
      letter-spacing:-3px;
    }

    .maroon{
      color:#800000;
    }

    .navy{
      color:#000080;
    }

    .sub{
      margin-top:-4px;
      letter-spacing:10px;
      font-size:12px;
      color:#555;
    }

    .loader{
      width:42px;
      height:42px;
      border:4px solid #ddd;
      border-top:4px solid #800000;
      border-radius:50%;
      margin-top:28px;
      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      100%{
        transform:rotate(360deg);
      }
    }

  </style>
</head>

<body>

  <div class="logo">
    <span class="maroon">KU</span><span class="navy">KAMI</span>

  <div class="loader"></div>
