<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>KUKAMI APP</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    body{
      font-family:'Inter',sans-serif;
      background:#f5f5f5;
      color:#222;
      overflow-x:hidden;
    }

    :root{
      --maroon:#6f0000;
      --gold:#d4af37;
      --soft:#fff9ef;
      --danger:#d90429;
      --success:#198754;
      --shadow:0 10px 25px rgba(0,0,0,.08);
    }

    .hidden{
      display:none!important;
    }

    .page{
      width:100%;
      min-height:100vh;
    }

    .center{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* SPLASH */
    #splash{
      background:linear-gradient(180deg,#6f0000,#2b0000);
      color:#fff;
      flex-direction:column;
      gap:18px;
      position:fixed;
      inset:0;
      z-index:9999;
    }

    .logo{
      width:120px;
      height:120px;
      border-radius:30px;
      background:rgba(255,255,255,.1);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:44px;
      font-weight:900;
      border:2px solid rgba(255,255,255,.15);
      backdrop-filter:blur(10px);
    }

    .title{
      font-family:'Montserrat',sans-serif;
      font-size:32px;
      font-weight:900;
      letter-spacing:2px;
    }

    .loader{
      width:160px;
      height:6px;
      border-radius:999px;
      background:rgba(255,255,255,.15);
      overflow:hidden;
    }

    .loader span{
      display:block;
      height:100%;
      width:40%;
      background:var(--gold);
      animation:load 1s infinite linear;
    }

    @keyframes load{
      from{transform:translateX(-100%)}
      to{transform:translateX(350%)}
    }

    /* LOGIN */
    #loginPage{
      padding:28px;
      background:linear-gradient(180deg,#6f0000 0%,#3d0000 100%);
    }

    .login-box{
      width:100%;
      max-width:420px;
      background:#fff;
      border-radius:28px;
      padding:28px;
      box-shadow:var(--shadow);
    }

    .login-head{
      text-align:center;
      margin-bottom:30px;
    }

    .login-head h1{
      font-family:'Montserrat',sans-serif;
      font-size:34px;
      color:var(--maroon);
      margin-bottom:6px;
    }

    .login-head p{
      color:#666;
      font-size:14px;
    }

    .input-group{
      margin-bottom:18px;
    }

    .input-group label{
      display:block;
      margin-bottom:8px;
      font-weight:600;
      color:#444;
      font-size:14px;
    }

    .input-group input{
      width:100%;
      height:54px;
      border-radius:16px;
      border:1px solid #ddd;
      padding:0 16px;
      font-size:16px;
      outline:none;
      transition:.2s;
    }

    .input-group input:focus{
      border-color:var(--maroon);
    }

    .btn{
      width:100%;
      border:none;
      height:56px;
      border-radius:18px;
      font-weight:700;
      font-size:16px;
      cursor:pointer;
    }

    .btn-primary{
      background:linear-gradient(180deg,#8b0000,#5e0000);
      color:#fff;
      box-shadow:0 12px 25px rgba(111,0,0,.25);
    }

    .btn-primary:active{
      transform:scale(.98);
    }

    /* DASHBOARD */
    #dashboardPage{
      background:#f5f5f5;
      padding-bottom:120px;
    }

    .topbar{
      background:linear-gradient(180deg,#7a0000,#510000);
      padding:24px 18px 32px;
      color:#fff;
      border-radius:0 0 28px 28px;
      position:relative;
      overflow:hidden;
    }

    .topbar::before{
      content:'';
      position:absolute;
      width:220px;
      height:220px;
      background:rgba(255,255,255,.06);
      border-radius:50%;
      right:-70px;
      top:-90px;
    }

    .profile{
      display:flex;
      align-items:center;
      gap:14px;
      position:relative;
      z-index:2;
    }

    .profile img{
      width:64px;
      height:64px;
      border-radius:50%;
      object-fit:cover;
      border:3px solid rgba(255,255,255,.2);
      background:#fff;
    }

    .profile h2{
      font-size:20px;
      margin-bottom:4px;
    }

    .saldo-card{
      margin-top:22px;
      background:rgba(255,255,255,.1);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.1);
      border-radius:24px;
      padding:18px;
      position:relative;
      z-index:2;
    }

    .saldo-card small{
      opacity:.8;
    }

    .saldo{
      font-size:34px;
      font-weight:800;
      margin-top:6px;
      color:#ffd86a;
    }

    .stats-wrap{
      padding:18px;
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
      margin-top:-20px;
      position:relative;
      z-index:4;
    }

    .stat-box{
      background:#fff;
      border-radius:22px;
      padding:18px;
      box-shadow:var(--shadow);
    }

    .stat-box h3{
      font-size:14px;
      color:#666;
      margin-bottom:10px;
    }

    .stat-box .num{
      font-size:28px;
      font-weight:800;
      color:var(--maroon);
    }

    .menu-grid{
      padding:0 18px;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
    }

    .menu-item{
      background:#fff;
      border-radius:22px;
      padding:18px 10px;
      text-align:center;
      box-shadow:var(--shadow);
      cursor:pointer;
    }

    .menu-item .icon{
      width:54px;
      height:54px;
      margin:auto;
      border-radius:18px;
      background:#fff7df;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      margin-bottom:12px;
    }

    .menu-item p{
      font-size:13px;
      font-weight:700;
    }

    .section{
      padding:18px;
    }

    .section-title{
      font-size:18px;
      font-weight:800;
      margin-bottom:14px;
      color:#333;
    }

    .trx-card{
      background:#fff;
      border-radius:22px;
      padding:16px;
      margin-bottom:12px;
      box-shadow:var(--shadow);
    }

    .trx-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
    }

    .trx-id{
      font-weight:800;
      color:var(--maroon);
      margin-bottom:4px;
    }

    .trx-ket{
      font-size:13px;
      color:#555;
    }

    .trx-nom{
      font-size:18px;
      font-weight:800;
    }

    .status-ok{
      color:var(--success);
      font-weight:700;
      font-size:12px;
      margin-top:8px;
    }

    .status-cancel{
      color:var(--danger);
      font-weight:700;
      font-size:12px;
      margin-top:8px;
    }

    .bottom-nav{
      position:fixed;
      bottom:0;
      left:0;
      width:100%;
      background:#fff;
      display:flex;
      justify-content:space-around;
      padding:14px 0 24px;
      box-shadow:0 -8px 25px rgba(0,0,0,.08);
      z-index:99;
    }

    .nav-item{
      text-align:center;
      font-size:12px;
      font-weight:700;
      color:#555;
    }

    .fab{
      position:fixed;
      bottom:92px;
      right:18px;
      width:64px;
      height:64px;
      border-radius:50%;
      border:none;
      background:linear-gradient(180deg,#a10000,#6f0000);
      color:#fff;
      font-size:30px;
      font-weight:900;
      box-shadow:0 12px 25px rgba(111,0,0,.3);
      z-index:99;
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.45);
      display:flex;
      align-items:flex-end;
      z-index:999;
    }

    .modal-box{
      width:100%;
      background:#fff;
      border-radius:28px 28px 0 0;
      padding:22px;
      max-height:90vh;
      overflow:auto;
    }

    .sheet-title{
      font-size:20px;
      font-weight:800;
      margin-bottom:18px;
    }

    .tarif-item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:#fafafa;
      padding:14px;
      border-radius:18px;
      margin-bottom:10px;
    }

    .tarif-item button{
      border:none;
      background:var(--maroon);
      color:#fff;
      border-radius:12px;
      height:40px;
      width:72px;
      font-weight:700;
    }

    .close{
      margin-top:12px;
      background:#eee;
      color:#333;
    }

    .loading{
      position:fixed;
      inset:0;
      background:rgba(255,255,255,.7);
      backdrop-filter:blur(5px);
      z-index:99999;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:18px;
      font-weight:700;
    }

    .spin{
      width:52px;
      height:52px;
      border-radius:50%;
      border:5px solid #ddd;
      border-top-color:var(--maroon);
      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      to{transform:rotate(360deg)}
    }

    @media(max-width:360px){
      .menu-grid{
        grid-template-columns:repeat(2,1fr);
      }
    }

  </style>
</head>
<body>

<div id="splash" class="page center">
  <div class="logo">K</div>
  <div class="title">KUKAMI</div>
  <div class="loader"><span></span></div>
</div>

<div id="loginPage" class="page center hidden">
  <div class="login-box">

    <div class="login-head">
      <h1>KUKAMI</h1>
      <p>Rider SuperApp Production Stable</p>
    </div>

    <div class="input-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="Masukkan username">
    </div>

    <div class="input-group">
      <label>PIN</label>
      <input type="password" id="pin" placeholder="Masukkan PIN">
    </div>

    <button class="btn btn-primary" onclick="login()">
      LOGIN RIDER
    </button>

  </div>
</div>

<div id="dashboardPage" class="page hidden">

  <div class="topbar">

    <div class="profile">
      <img id="fotoRider" src="https://i.imgur.com/6VBx3io.png">

      <div>
        <h2 id="namaRider">RIDER</h2>
        <div id="kelasRider">KELAS GOLD</div>
      </div>
    </div>

    <div class="saldo-card">
      <small>Saldo Rider</small>
      <div class="saldo" id="saldoText">Rp 0</div>
    </div>

  </div>

  <div class="stats-wrap">

    <div class="stat-box">
      <h3>Trip Hari Ini</h3>
      <div class="num" id="tripHari">0</div>
    </div>

    <div class="stat-box">
      <h3>Trip Bulan Ini</h3>
      <div class="num" id="tripBulan">0</div>
    </div>

  </div>

  <div class="menu-grid">

    <div class="menu-item" onclick="openTransaksi()">
      <div class="icon">🧾</div>
      <p>Transaksi</p>
    </div>

    <div class="menu-item" onclick="topup()">
      <div class="icon">💳</div>
      <p>Top Up</p>
    </div>

    <div class="menu-item" onclick="logout()">
      <div class="icon">🚪</div>
      <p>Logout</p>
    </div>

  </div>

  <div class="section">

    <div class="section-title">Riwayat Transaksi</div>

    <div id="riwayatContainer"></div>

  </div>

</div>

<button class="fab hidden" id="fabBtn" onclick="openTransaksi()">+</button>

<div class="bottom-nav hidden" id="bottomNav">
  <div class="nav-item">Dashboard</div>
  <div class="nav-item">Riwayat</div>
  <div class="nav-item">Profil</div>
</div>

<div id="modalTransaksi" class="modal hidden">
  <div class="modal-box">

    <div class="sheet-title">Buat Transaksi</div>

    <div id="tarifList"></div>

    <button class="btn close" onclick="closeTransaksi()">Tutup</button>

  </div>
</div>

<div id="loading" class="loading hidden">
  <div class="spin"></div>
  <div>Memproses...</div>
</div>

<script>

const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwfebQ8V1-2Iw9O4x_hLD4Wv_TqFhmz0zK_G2IhyjD9V6M9h_WM-r3caSQespQuncpa2g/exec";

let riderData = null;
let dashboardData = null;

setTimeout(()=>{
  document.getElementById('splash').classList.add('hidden');
  document.getElementById('loginPage').classList.remove('hidden');
},1800);

function showLoading(){
  document.getElementById('loading').classList.remove('hidden');
}

function hideLoading(){
  document.getElementById('loading').classList.add('hidden');
}

function generateFingerprint(){
  return btoa(
    navigator.userAgent+
    screen.width+
    screen.height+
    Intl.DateTimeFormat().resolvedOptions().timeZone
  ).substring(0,32);
}

async function login(){

  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('pin').value.trim();

  if(!u || !p){
    alert('Lengkapi username dan PIN');
    return;
  }

  showLoading();

  try{

    const fp = generateFingerprint();

    const url = WEBAPP_URL+
      '?action=login'+
      '&u='+encodeURIComponent(u)+
      '&p='+encodeURIComponent(p)+
      '&d='+encodeURIComponent(fp)+
      '&t='+encodeURIComponent(navigator.userAgent);

    const res = await fetch(url + "&nocache=" + Date.now());
    const data = await res.json();

    hideLoading();

    if(data.status === 'success'){

      riderData = data.rider;

      localStorage.setItem('kukami_rider',JSON.stringify(data.rider));

      openDashboard();

    }else if(data.status === 'device_locked'){

      alert('AKSES DITOLAK! Akun terkunci di perangkat lain.');

    }else{

      alert('Username atau PIN salah');

    }

  }catch(err){

    hideLoading();
    alert('Koneksi gagal');

  }
}

async function openDashboard(){

  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('dashboardPage').classList.remove('hidden');
  document.getElementById('fabBtn').classList.remove('hidden');
  document.getElementById('bottomNav').classList.remove('hidden');

  await loadDashboard();
}

async function loadDashboard(){

  if(!riderData)return;

  showLoading();

  try{

    const res = await fetch(
      WEBAPP_URL+
      '?action=dashboard&id='+encodeURIComponent(riderData.id)
    );

    dashboardData = await res.json();

    hideLoading();

    renderDashboard();

  }catch(err){

    hideLoading();
    alert('Gagal mengambil dashboard');

  }
}

function renderDashboard(){

  document.getElementById('namaRider').innerText = riderData.nama;

  document.getElementById('kelasRider').innerText = dashboardData.kelas || 'KELAS RIDER';

  document.getElementById('saldoText').innerText = formatRupiah(dashboardData.saldo || 0);

  document.getElementById('tripHari').innerText = dashboardData.stats.hari.total || 0;

  document.getElementById('tripBulan').innerText = dashboardData.stats.bulan.total || 0;

  if(dashboardData.foto){
    document.getElementById('fotoRider').src = dashboardData.foto;
  }

  renderRiwayat();
  renderTarif();
}

function renderRiwayat(){

  const wrap = document.getElementById('riwayatContainer');

  wrap.innerHTML = '';

  dashboardData.riwayat.forEach(item=>{

    const div = document.createElement('div');

    div.className = 'trx-card';

    div.innerHTML = `
      <div class="trx-top">
        <div>
          <div class="trx-id">${item.id}</div>
          <div class="trx-ket">${item.ket}</div>
          <div class="trx-ket">${item.tglDisplay} • ${item.jam}</div>
        </div>

        <div style="text-align:right">
          <div class="trx-nom">${formatRupiah(item.nom)}</div>
          <div class="${item.status.includes('CANCEL') ? 'status-cancel':'status-ok'}">
            ${item.status}
          </div>
        </div>
      </div>
    `;

    wrap.appendChild(div);
  });
}

function renderTarif(){

  const list = document.getElementById('tarifList');

  list.innerHTML = '';

  dashboardData.listTarif.forEach(item=>{

    const div = document.createElement('div');

    div.className = 'tarif-item';

    div.innerHTML = `
      <div>
        <div style="font-weight:800">${item.layanan}</div>
        <div style="font-size:13px;color:#666">${formatRupiah(item.nominal)}</div>
      </div>

      <button onclick='buatTrx(${JSON.stringify(item)})'>Pilih</button>
    `;

    list.appendChild(div);
  });
}

function openTransaksi(){
  document.getElementById('modalTransaksi').classList.remove('hidden');
}

function closeTransaksi(){
  document.getElementById('modalTransaksi').classList.add('hidden');
}

async function buatTrx(item){

  if(!confirm('Buat transaksi '+item.layanan+' ?'))return;

  showLoading();

  const payload = {
    idRider:riderData.id,
    tipe:'ONLINE',
    deviceInfo:navigator.userAgent,
    items:[{
      ket:item.layanan,
      nominal:item.nominal,
      qty:1,
      potongan:item.potongan || 0
    }]
  };

  try{

    const res = await fetch(
      WEBAPP_URL+
      '?action=transaksi&payload='+
      encodeURIComponent(JSON.stringify(payload))
    );

    const data = await res.json();

    hideLoading();

    if(data.status === 'success'){

      alert(
        'TRANSAKSI BERHASIL\n\n'+
        'NOTA : '+data.nota+'\n'+
        'TOTAL : '+formatRupiah(data.total)
      );

      closeTransaksi();
      loadDashboard();

    }else{

      alert('Gagal membuat transaksi');

    }

  }catch(err){

    hideLoading();
    alert('Koneksi gagal');

  }
}

function topup(){

  const nominal = prompt('Masukkan nominal top up');

  if(!nominal)return;

  alert('Request top up berhasil dikirim');
}

function logout(){

  localStorage.removeItem('kukami_rider');

  location.reload();
}

function formatRupiah(num){
  return 'Rp '+Number(num).toLocaleString('id-ID');
}

window.onload = ()=>{

  const saved = localStorage.getItem('kukami_rider');

  if(saved){

    riderData = JSON.parse(saved);

    document.getElementById('splash').classList.add('hidden');

    openDashboard();
  }
}

</script>

</body>
</html>
