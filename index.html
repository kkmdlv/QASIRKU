<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUKAMI APP</title>

<style>
body{font-family:Inter;background:#f5f5f5;margin:0}
.page{padding:20px}
.hidden{display:none}
.box{background:#fff;padding:20px;border-radius:16px;max-width:420px;margin:auto}
input{width:100%;padding:14px;margin:10px 0;border-radius:10px;border:1px solid #ddd}
button{width:100%;padding:14px;border:0;border-radius:10px;background:#6f0000;color:#fff;font-weight:bold}
</style>
</head>

<body>

<div id="loginPage" class="page">
  <div class="box">
    <h2>KUKAMI LOGIN</h2>

    <input id="username" placeholder="Username">
    <input id="pin" type="password" placeholder="PIN">

    <button onclick="login()">LOGIN</button>

    <p id="msg" style="color:red"></p>
  </div>
</div>

<div id="dashboard" class="page hidden">
  <div class="box">
    <h2 id="nama">Dashboard</h2>
    <p id="saldo"></p>
  </div>
</div>

<script>

const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzAEqfxIp32-C_dNih-XGUikWFxHKG6oKOyKFljrtaE4YLygjPZHd5q3-RHU_PxjssvKw/exec";

let rider = null;

async function login(){

  const u = document.getElementById('username').value;
  const p = document.getElementById('pin').value;

  document.getElementById('msg').innerText = "";

  const url = WEBAPP_URL + "?action=login&u=" + encodeURIComponent(u) + "&p=" + encodeURIComponent(p);

  try {

    const res = await fetch(url);
    const data = await res.json();

    if(data.status === "success"){

      rider = data.rider;

      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');

      document.getElementById('nama').innerText = rider.nama;
      document.getElementById('saldo').innerText = "Saldo: Rp " + rider.saldo;

    }

    else if(data.status === "device_locked"){
      document.getElementById('msg').innerText = "Akun terkunci di device lain";
    }

    else if(data.status === "invalid_credentials"){
      document.getElementById('msg').innerText = "Username / PIN salah";
    }

    else {
      document.getElementById('msg').innerText = "Server error";
    }

  } catch(err){
    document.getElementById('msg').innerText = "Koneksi gagal";
  }
}

</script>

</body>
</html>
