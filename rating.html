<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <title>KUKAMI - Rating Layanan</title>
  <style>
    /* KUKAMI RATING v2.6 - LOCK UI PREMIUM - SUPER CLEAN & SUPER SECURE */
    :root { --maroon: #800000; --navy: #000080; --gold: #D4AF37; --bg: #E5E5E5; --white: #fff; }
    body { font-family: sans-serif; margin: 0; background: var(--bg); padding: 15px; user-select: none; }
    .rating-card { background: var(--white); border-radius: 20px; padding: 30px 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 6px solid var(--maroon); margin-top: 40px; position: relative; }
    .logo-area { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 32px; letter-spacing: -2px; margin-bottom: 5px; }
    .stars { display: flex; justify-content: center; gap: 8px; margin: 25px 0; flex-direction: row-reverse; }
    .star { font-size: 40px; color: #ddd; cursor: pointer; transition: 0.2s; }
    .star:hover, .star:hover ~ .star, .star.selected, .star.selected ~ .star { color: var(--gold); transform: scale(1.1); }
    textarea { width: 100%; height: 80px; padding: 15px; border: 1px solid #ccc; border-radius: 12px; font-family: 'Inter', sans-serif; font-size: 13px; resize: none; box-sizing: border-box; outline: none; margin-bottom: 20px; background: #f9f9f9; }
    textarea:focus { border-color: var(--maroon); background: #fff; }
    .btn { background: var(--maroon); color: var(--gold); border: none; width: 100%; padding: 16px; border-radius: 50px; font-weight: 900; font-size: 14px; cursor: pointer; letter-spacing: 1px; box-shadow: 0 4px 10px rgba(128,0,0,0.3); }
    .btn:disabled { background: #999; color: #ddd; cursor: not-allowed; box-shadow: none; }
    .inv-badge { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); background: var(--navy); color: white; padding: 5px 15px; border-radius: 20px; font-size: 11px; font-weight: 800; letter-spacing: 1px; border: 2px solid var(--gold); white-space: nowrap; }
    
    #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 30000; flex-direction: column; align-items: center; justify-content: center; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--maroon); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
  </style>
</head>
<body>

  <div id="loader">
    <div class="spinner"></div>
    <div style="font-weight: 800; color: var(--maroon); font-size: 14px; letter-spacing: 1px;">MEMPROSES...</div>
  </div>

  <div class="rating-card" id="form-area">
    <div class="inv-badge" id="display-inv">INV: MEMUAT...</div>
    <div class="logo-area"><span style="color:var(--maroon);">KU</span><span style="color:var(--navy);">KAMI</span></div>
    <div style="font-size: 12px; color: #666; font-weight: 600; margin-bottom: 10px;">BAGAIMANA PELAYANAN KAMI?</div>
    
    <div class="stars">
      <span class="star" onclick="setRating(5)">★</span>
      <span class="star" onclick="setRating(4)">★</span>
      <span class="star" onclick="setRating(3)">★</span>
      <span class="star" onclick="setRating(2)">★</span>
      <span class="star" onclick="setRating(1)">★</span>
    </div>
    
    <textarea id="ulasan" placeholder="Tulis masukan Anda di sini (opsional)..."></textarea>
    <button class="btn" id="btn-kirim" onclick="kirimRating()">KIRIM PENILAIAN</button>
  </div>

  <script>
    // 🔴 WAJIB SAMA DENGAN API_URL YANG ADA DI INDEX.HTML
    const API_URL = "https://script.google.com/macros/s/AKfycbxmFUFUyIVw7hmF7j8-j8ihdGtT0O0oYtIFuuQvcJwArLgYyNPu4VVX6SQtosa6WHIxJA/exec";

    // 🚀 MESIN PENGGANTI google.script.run
    async function KUKAMI_API(actionName, parameters) {
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: actionName, params: parameters })
        });
        const result = await response.json();
        if(result.status === "error") throw new Error(result.message);
        return result.data;
      } catch (err) {
        console.error("API Error:", err);
        throw err;
      }
    }

    var selectedStarNumber = 0;
    
    // TANGKAP DATA DARI LINK WHATSAPP (URL Parameters)
    const urlParams = new URLSearchParams(window.location.search);
    const currentInvoiceParam = urlParams.get('inv') || "-";
    const currentRiderParam = urlParams.get('rider') || "";

    // Tampilkan nomor invoice di layar
    document.getElementById('display-inv').innerText = "INV: " + currentInvoiceParam;

    function setRating(num) {
      selectedStarNumber = num;
      var stars = document.querySelectorAll('.star');
      stars.forEach(function(s) { s.classList.remove('selected'); });
      // Karena flex-direction: row-reverse, indexnya terbalik di CSS, kita pancing dari klik
      event.target.classList.add('selected');
    }

    function showVisualLoading(status) {
      document.getElementById('loader').style.display = status ? 'flex' : 'none';
    }

    function kirimRating() {
      if (selectedStarNumber === 0) {
        alert("Mohon pilih bintang terlebih dahulu!");
        return;
      }
      
      var tombolKirim = document.getElementById('btn-kirim');
      tombolKirim.disabled = true;
      showVisualLoading(true);

      var payloadUlasan = {
        invoice: currentInvoiceParam,
        riderId: currentRiderParam,
        rating: selectedStarNumber,
        ulasan: document.getElementById('ulasan').value.trim()
      };

      // EKSEKUSI PENGIRIMAN DATA KE DATABASE
      KUKAMI_API("simpanUlasanKonsumen", payloadUlasan)
        .then(function(res) {
          showVisualLoading(false);
          var status = res ? res.status : "error";
          
          if (status === "success") {
            document.getElementById('form-area').innerHTML = '<div style="padding: 40px 10px;"><div style="font-size: 50px; margin-bottom: 15px;">🌟</div><h3 style="color:var(--maroon); font-weight:900; margin:0 0 10px 0;">TERIMA KASIH!</h3><p style="color:#555; font-size:13px; line-height:1.6; margin:0;">Ulasan Anda telah disimpan.<br>Halaman ini akan menutup otomatis dalam 5 detik.</p></div>';
            
            // 🌟 DETIKAN AUTO-CLOSE
            setTimeout(function() {
              window.close();
            }, 5000);
            
          } else if (status === "duplicate") {
            alert("Maaf, Transaksi dengan nomor nota ini sudah pernah dinilai sebelumnya.");
            tombolKirim.disabled = false;
          } else if (status === "fraud_blocked") {
            alert("⚠️ AKSES DITOLAK!\nRider dilarang keras mengisi penilaian performa miliknya sendiri.");
            tombolKirim.disabled = false;
          } else {
            alert("Gagal mengirim ulasan.");
            tombolKirim.disabled = false;
          }
        })
        .catch(function(err) {
          showVisualLoading(false);
          tombolKirim.disabled = false;
          alert("Gagal Terhubung ke Server KUKAMI.");
        });
    }
  </script>
</body>
</html>
