<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* KUKAMI RATING v2.6 - LOCK UI PREMIUM - SUPER CLEAN & SUPER SECURE */
    :root { --maroon: #800000; --navy: #000080; --gold: #D4AF37; --bg: #E5E5E5; --white: #fff; }
    body { font-family: sans-serif; margin: 0; background: var(--bg); padding: 15px; user-select: none; }
    .rating-card { background: var(--white); border-radius: 20px; padding: 30px 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 6px solid var(--maroon); margin-top: 40px; position: relative; }
    .logo-area { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 32px; letter-spacing: -2px; margin-bottom: 5px; }
    .logo-area .mn { color: var(--maroon); }
    .logo-area .nv { color: var(--navy); }
    .sub-logo { font-size: 11px; letter-spacing: 6px; text-transform: lowercase; display: block; color: #666; margin-top: -5px; margin-bottom: 25px; }
    
    #rider-foto-container { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--gold); margin: 0 auto 15px; display: block; background: #f0f0f0; overflow: hidden; position: relative; }
    #rider-foto { width: 100%; height: 100%; object-fit: cover; display: block; }
    
    #rider-nama { font-size: 18px; font-weight: bold; color: #333; margin: 0 0 5px 0; text-transform: uppercase; font-family: 'Inter', sans-serif; }
    .nota-badge { display: inline-block; background: #f0f0f0; color: #555; padding: 4px 12px; border-radius: 12px; font-size: 11px; font-weight: bold; margin-bottom: 25px; font-family: 'Inter', sans-serif; }
    
    .stars-wrapper { display: flex; flex-direction: row-reverse; justify-content: center; gap: 10px; margin-bottom: 20px; }
    .stars-wrapper input { display: none; }
    .stars-wrapper label { font-size: 40px; color: #ddd; cursor: pointer; transition: color 0.1s; }
    .stars-wrapper input:checked ~ label, .stars-wrapper label:hover, .stars-wrapper label:hover ~ label { color: var(--gold); }
    
    textarea { width: 100%; height: 100px; padding: 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 14px; outline: none; box-sizing: border-box; resize: none; margin-bottom: 20px; font-family: inherit; }
    .btn-submit { background: var(--maroon); color: white; border: none; width: 100%; padding: 16px; border-radius: 50px; font-weight: bold; font-size: 15px; cursor: pointer; display: block; }
    .btn-submit:disabled { background: #ccc !important; cursor: not-allowed; opacity: 0.7; }
    
    #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--maroon); border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; margin-bottom: 10px; }
  </style>
</head>
<body>

  <div id="loader"><div class="spinner"></div><div id="loader-text" style="font-size:12px; color:#666;">Memproses...</div></div>

  <div class="rating-card" id="rating-card-area">
    <div class="logo-area"><span class="mn">KU</span><span class="nv">KAMI</span></div>
    <span class="sub-logo">delivery</span>
    
    <div id="rider-foto-container"><img id="rider-foto" src="" onerror="showAvatar(this)"></div>
    <h3 id="rider-nama">MEMUAT PROFIL RIDER...</h3>
    <div id="nota-display" class="nota-badge">Nota: -</div>
    
    <form id="rating-form" onsubmit="handleFormSubmit(event)">
      <div class="stars-wrapper">
        <input type="radio" name="bintang" id="b5" value="5" onclick="selectStar(5)"><label for="b5">★</label>
        <input type="radio" name="bintang" id="b4" value="4" onclick="selectStar(4)"><label for="b4">★</label>
        <input type="radio" name="bintang" id="b3" value="3" onclick="selectStar(3)"><label for="b3">★</label>
        <input type="radio" name="bintang" id="b2" value="2" onclick="selectStar(2)"><label for="b2">★</label>
        <input type="radio" name="bintang" id="b1" value="1" onclick="selectStar(1)"><label for="b1">★</label>
      </div>
      <textarea id="ulasan" placeholder="Masukkan Kritik/Saran pelayanan Rider kami (Opsional)"></textarea>
      <button type="submit" id="tombol-kirim" class="btn-submit">KIRIM PENILAIAN</button>
    </form>
  </div>

  <script>
    var selectedStarNumber = 0;
    
    // 🌟 SINKRONISASI MUTLAK: Menangkap suntikan langsung dari mesin doGet(e) Code.gs Bos
    var currentInvoiceParam = "<?= inv ?>";
    var currentRiderParam = "<?= rider ?>";

    // Generator Sidik Jari Browser untuk Sistem Pengunci Keamanan Anti-Fraud
    function generateConsumerFingerprint() {
      var id = localStorage.getItem('kukami_fp');
      if (!id) {
        id = 'ID-' + Math.random().toString(36).substr(2, 9).toUpperCase();
        localStorage.setItem('kukami_fp', id);
      }
      return id;
    }

    function showVisualLoading(show, text) {
      document.getElementById('loader').style.display = show ? 'flex' : 'none';
      if(text) document.getElementById('loader-text').innerText = text;
    }

    function showAvatar(imgEl) {
      imgEl.src = "https://w7.pngwing.com/pngs/340/946/png-transparent-avatar-user-computer-icons-software-developer-avatar-child-face-heroes-thumbnail.png";
    }

    function selectStar(num) { selectedStarNumber = num; }

    // 🌟 LOADING PROFIL RIDER SECARA KILAT SAAT HALAMAN DIBUKA KONSUMEN
    window.onload = function() {
      document.getElementById('nota-display').innerText = "Nota: " + currentInvoiceParam;
      
      if (!currentRiderParam || currentRiderParam.trim() === "" || currentRiderParam === "-") {
        document.getElementById('rider-nama').innerText = "LINK RATING INVALID";
        return;
      }

      showVisualLoading(true, "Memuat Profil...");
      
      google.script.run
        .withSuccessHandler(function(res) {
          showVisualLoading(false);
          if (res && res.nama) {
            // Pasang Nama & Foto secara akurat dari database Kolom B & D
            document.getElementById('rider-nama').innerText = res.nama.toUpperCase();
            if (res.foto && res.foto.trim() !== "") {
              document.getElementById('rider-foto').src = res.foto;
            } else { showAvatar(document.getElementById('rider-foto')); }
          } else {
            document.getElementById('rider-nama').innerText = "RIDER KUKAMI";
            showAvatar(document.getElementById('rider-foto'));
          }
        })
        .withFailureHandler(function() {
          showVisualLoading(false);
          document.getElementById('rider-nama').innerText = "RIDER KUKAMI";
          showAvatar(document.getElementById('rider-foto'));
        })
        .getProfileRiderForRating(currentRiderParam);
    };

    // 🌟 PROSES SUBMIT RATING DAN BLOCKER FRAUD
    function handleFormSubmit(e) {
      if (e) e.preventDefault();
      if (selectedStarNumber === 0) {
        alert("Mohon pilih jumlah Bintang terlebih dahulu!");
        return false;
      }

      var tombolKirim = document.getElementById('tombol-kirim');
      tombolKirim.disabled = true;
      showVisualLoading(true, "Mengirim Penilaian...");

      google.script.run
        .withSuccessHandler(function(status) {
          showVisualLoading(false);
          tombolKirim.disabled = false;
          
          if (status === "success") {
            // Tampilan Sukses Minimalis Premium Tanpa Debugger Proses
            document.getElementById('rating-card-area').innerHTML = '<div style="padding:40px 10px;"><div style="font-size:50px; margin-bottom:15px;">🌟</div><h3 style="color:var(--maroon); font-weight:900; margin:0 0 10px 0;">TERIMA KASIH!</h3><p style="color:#555; font-size:13px; line-height:1.6; margin:0;">Ulasan Anda telah disimpan.<br>Halaman ini akan menutup otomatis dalam 5 detik.</p></div>';
            
            // 🌟 DETIKAN AUTO-CLOSE 5 DETIK SETELAH TRANSAKSI BERHASIL
            setTimeout(function() {
              window.close();
            }, 5000);
            
          } else if (status === "duplicate") {
            alert("Maaf, Transaksi dengan nomor nota ini sudah pernah dinilai sebelumnya.");
          } else if (status === "fraud_blocked") {
            // 🌟 BLOKIRAN TOTAL JIKA RIDER MEMAKSA RATING DIRINYA SENDIRI
            alert("⚠️ AKSES DITOLAK!\nRider dilarang keras mengisi penilaian performa miliknya sendiri.");
          } else {
            alert("Gagal mengirim ulasan.");
          }
        })
        .withFailureHandler(function() {
          showVisualLoading(false);
          tombolKirim.disabled = false;
          alert("Gagal Terhubung ke Server.");
        })
        .simpanUlasanKonsumen({
          invoice: currentInvoiceParam,
          riderId: currentRiderParam,
          rating: selectedStarNumber,
          ulasan: document.getElementById('ulasan').value.trim(),
          consumerFp: generateConsumerFingerprint() // Kirim Token Sidik Jari untuk divalidasi silang di server
        });
      return false;
    }
  </script>
</body>
</html>
